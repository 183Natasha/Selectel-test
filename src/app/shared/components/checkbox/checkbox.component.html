<div class="checkbox-container">
  <div class="checkbox-item">
    @for (option of optionsCheckbox; track option.value) {
    <label>
      <input type="checkbox" name="optionGroup" [value]="option.value" >
      {{ option.label }}
    </label>
    }
  </div>
  <button (click)=toggleVisibility() >button</button>
  <div [hidden]="!isVisible">Контент виден</div>

</div>
